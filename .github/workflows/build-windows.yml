name: Build Windows EXE

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install pymupdf pillow pyinstaller
          pip install -e .

      - name: Build EXE
        run: |
          pyinstaller --noconfirm pdfCropMargins_windows.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfCropMargins-Windows
          path: dist\pdfCropMargins.exe
